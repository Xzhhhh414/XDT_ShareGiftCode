<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心动小镇兑换码聚合</title>
    <meta
      name="description"
      content="玩家向心动小镇兑换码聚合工具，支持查看、复制和反馈兑换码状态。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <h1>心动小镇兑换码</h1>
          <p class="meta-line">
            <span id="updatedAt">更新中</span>
          </p>
        </div>
        <button class="topbar-action" type="button" data-action="open-submission">分享新的兑换码</button>
      </header>

      <section class="redeem-inline" aria-label="兑换码使用方法">
        <span>兑换码使用方法：点击手表内“设置”</span>
        <span>点击底部“兑换码”入口</span>
        <span>输入兑换码即可</span>
      </section>

      <main class="workspace">
        <section class="content-panel" aria-label="兑换码列表">
          <div class="code-list" id="codeList"></div>
          <div class="empty-state" id="emptyState" hidden>
            <p>当前没有可展示的兑换码</p>
          </div>
        </section>
      </main>
    </div>

    <div class="feedback-modal" id="submissionModal" role="dialog" aria-modal="true" aria-labelledby="submissionModalTitle" hidden>
      <div class="feedback-dialog">
        <button class="modal-close" type="button" data-action="close-submission" aria-label="关闭">×</button>
        <h2 class="modal-title" id="submissionModalTitle">分享新的兑换码</h2>
        <p class="modal-copy">感谢你补充新的礼包码。提交后会进入待审核，不会立刻展示给其他玩家。</p>
        <form class="reward-form" id="submissionForm">
          <label class="field-label" for="submissionTitleInput">名称</label>
          <input
            class="field-input"
            id="submissionTitleInput"
            name="title"
            maxlength="40"
            placeholder="例如：今日限时礼包码"
            required
          />
          <label class="field-label" for="submissionCodeInput">兑换码</label>
          <input
            class="field-input"
            id="submissionCodeInput"
            name="code"
            maxlength="40"
            placeholder="例如：HAPPYTOWN"
            required
          />
          <label class="field-label" for="submissionRewardInput">奖励</label>
          <input
            class="field-input"
            id="submissionRewardInput"
            name="reward"
            maxlength="80"
            placeholder="例如：金币、家具材料"
            required
          />
          <label class="field-label" for="submissionExpireInput">有效期</label>
          <input
            class="field-input date-field-input"
            id="submissionExpireInput"
            name="expireAt"
            type="date"
            required
          />
          <label class="field-label" for="submissionSourceInput">来源链接或说明（选填）</label>
          <textarea
            class="reward-input"
            id="submissionSourceInput"
            name="sourceUrl"
            rows="3"
            maxlength="160"
            placeholder="可以填写你看到兑换码的位置，方便后续审核"
          ></textarea>
          <button class="feedback-option" type="submit">提交</button>
        </form>
      </div>
    </div>

    <div class="feedback-modal" id="feedbackModal" role="dialog" aria-modal="true" aria-labelledby="feedbackModalTitle" hidden>
      <div class="feedback-dialog">
        <button class="modal-close" type="button" data-action="close-feedback" aria-label="关闭">×</button>
        <h2 class="modal-title" id="feedbackModalTitle">发布使用结果</h2>
        <p class="modal-copy">感谢你帮助其他玩家确认礼包码状态，请选择这次兑换结果。</p>
        <div class="feedback-options" aria-label="使用结果">
          <button class="feedback-option" type="button" data-feedback-result="valid">可用</button>
          <button class="feedback-option danger" type="button" data-feedback-result="invalid">失效</button>
        </div>
      </div>
    </div>

    <div class="feedback-modal" id="rewardModal" role="dialog" aria-modal="true" aria-labelledby="rewardModalTitle" hidden>
      <div class="feedback-dialog">
        <button class="modal-close" type="button" data-action="close-reward" aria-label="关闭">×</button>
        <h2 class="modal-title" id="rewardModalTitle">分享奖励内容</h2>
        <p class="modal-copy">感谢你帮助其他玩家补充礼包奖励，请填写这次兑换后看到的奖励内容。</p>
        <form class="reward-form" id="rewardForm">
          <label class="field-label" for="rewardInput">奖励内容</label>
          <textarea
            class="reward-input"
            id="rewardInput"
            name="reward"
            rows="3"
            maxlength="80"
            placeholder="例如：金币、家具材料、服装券"
            required
          ></textarea>
          <button class="feedback-option" type="submit">提交</button>
        </form>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./data/codes.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
