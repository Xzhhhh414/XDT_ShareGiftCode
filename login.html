<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录兑换码后台</title>
    <meta name="description" content="心动小镇兑换码管理后台登录。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="loginTitle">
        <p class="eyebrow">心动小镇</p>
        <h1 id="loginTitle">兑换码后台</h1>
        <p class="login-description">请输入管理员密码后继续。</p>
        <form id="loginForm" class="login-form">
          <label class="field-label" for="adminPassword">管理员密码</label>
          <input class="field-input" id="adminPassword" name="password" type="password" autocomplete="current-password" required />
          <p class="login-error" id="loginError" role="alert"></p>
          <button class="admin-action-button source-primary-action login-submit" type="submit">登录</button>
        </form>
      </section>
    </main>
    <script src="./login.js"></script>
  </body>
</html>
